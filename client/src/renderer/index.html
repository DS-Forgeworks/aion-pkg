<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aion — Connect</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="connect-card" id="connectCard">
    <!-- Aion Branding -->
    <div class="brand">
      <div class="orb">
        <svg viewBox="0 0 64 64" fill="none">
          <defs>
            <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6366F1"/>
              <stop offset="100%" stop-color="#818CF8"/>
            </linearGradient>
          </defs>
          <circle cx="32" cy="32" r="24" stroke="url(#sg)" stroke-width="2.5"/>
          <circle cx="32" cy="32" r="12" stroke="url(#sg)" stroke-width="2"/>
          <circle cx="32" cy="32" r="3" fill="url(#sg)"/>
          <ellipse cx="32" cy="32" rx="24" ry="10" stroke="url(#sg)" stroke-width="1.2" opacity="0.4" transform="rotate(-20,32,32)"/>
          <ellipse cx="32" cy="32" rx="24" ry="10" stroke="url(#sg)" stroke-width="1.2" opacity="0.4" transform="rotate(20,32,32)"/>
        </svg>
      </div>
      <h1 class="brand-title">Aion</h1>
      <p class="brand-subtitle">OUTREACH</p>
    </div>

    <!-- Status Indicator -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Ready to connect</span>
    </div>

    <!-- Connection Form -->
    <form id="connectForm" autocomplete="off">
      <div class="form-group">
        <label for="serverUrl">Server URL</label>
        <input type="text" id="serverUrl"
               placeholder="wss://your-server.com:7443"
               spellcheck="false"
               autocomplete="off"
               autocorrect="off">
      </div>

      <div class="form-group">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey"
               placeholder="Your API key from admin settings"
               spellcheck="false"
               autocomplete="off">
        <button type="button" class="toggle-pw" id="toggleKey" aria-label="Toggle API key visibility">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="saveSettings">
          <span class="checkbox-custom"></span>
          Remember server &amp; key (stored locally)
        </label>
      </div>

      <button type="submit" class="connect-btn" id="connectBtn">
        <span class="btn-text" id="connectBtnText">Connect</span>
        <div class="spinner" id="connectSpinner" style="display:none">
          <div class="spinner-ring"></div>
        </div>
      </button>

      <div class="error-msg" id="errorMsg" style="display:none"></div>
    </form>

    <div class="footer-text">
      <p>Connect to your Aion server to access your outreach dashboard.</p>
    </div>
  </div>

  <!-- App Container (hidden until connected) -->
  <div class="app-container" id="appContainer" style="display:none">
    <div class="app-toolbar">
      <div class="app-toolbar-brand">
        <svg viewBox="0 0 64 64" fill="none" width="24" height="24">
          <circle cx="32" cy="32" r="24" stroke="url(#sg)" stroke-width="2.5"/>
          <circle cx="32" cy="32" r="12" stroke="url(#sg)" stroke-width="2"/>
          <circle cx="32" cy="32" r="3" fill="url(#sg)"/>
        </svg>
        <span class="app-toolbar-title">Aion</span>
      </div>
      <div class="app-toolbar-actions">
        <span class="connection-indicator connected" id="connIndicator"></span>
        <span class="connection-label" id="connLabel">Connected</span>
        <button class="toolbar-btn" id="disconnectBtn" title="Disconnect">✕</button>
      </div>
    </div>
    <webview id="appView" class="app-view" allowpopups></webview>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>

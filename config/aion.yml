# Aion — OpenClaw Gateway Configuration
# Auto-generated by aion setup. Edit ~/.aion/config.json for user settings.

gateway:
  bind: "0.0.0.0"
  port: 7443
  
  # Aion branding
  name: "Aion Outreach"
  description: "Intelligent outreach platform — find, enrich, and connect"
  
  # Extensions
  extensions:
    entries:
      aion-web-ui:
        package: "./web"
        enabled: true
      
      aion-skills:
        package: "./skills"
        enabled: true

  # Plugins
  plugins:
    entries:
      device-pair:
        enabled: false  # No pairing needed — single user desktop app

services:
  email-server:
    enabled: true
    port: 3002
    provider: gmail
    
  lead-enrichment:
    enabled: true
    providers:
      - maigret
      - crawl4ai
    
  campaign-scheduler:
    enabled: true
    max_daily: 500

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Aion orb symbol -->
  <circle cx="60" cy="60" r="36" fill="none" stroke="url(#grad)" stroke-width="3.5"/>
  <circle cx="60" cy="60" r="18" fill="none" stroke="url(#grad)" stroke-width="2.5"/>
  <circle cx="60" cy="60" r="4" fill="url(#grad)"/>
  <!-- Orbit rings -->
  <ellipse cx="60" cy="60" rx="36" ry="14" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.4" transform="rotate(-20, 60, 60)"/>
  <ellipse cx="60" cy="60" rx="36" ry="14" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.4" transform="rotate(20, 60, 60)"/>
  <!-- Text -->
  <text x="110" y="72" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="600" fill="url(#grad)">Aion</text>
  <text x="110" y="98" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#64748B" letter-spacing="6">OUTREACH</text>
</svg>
